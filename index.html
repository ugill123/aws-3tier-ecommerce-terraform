<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Storefront</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-red-500">
            CloudStore
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                🛒 Cart: <span id="cart-count" class="font-bold text-orange-400">0</span> items
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-4">High-Availability Merchandise</h1>
            <p class="text-slate-400">Served globally via CloudFront. Data sourced from RDS. Carts powered by ElastiCache.</p>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="col-span-3 text-center text-slate-400 py-12">
                <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-orange-400 rounded-full mb-4"></div>
                <p>Connecting to Backend API...</p>
            </div>
        </div>
    </main>

    <script>
        // Use your actual ALB DNS Name here. 
        // TIP: If using CloudFront over HTTPS, browsers may block this HTTP call.
        const ALB_BASE_URL = 'http://tf-final-assessment-prod-alb-583317798.us-east-1.elb.amazonaws.com';
        
        const USER_ID = 'user_' + Math.floor(Math.random() * 10000);
        let cart = [];

        async function fetchProducts() {
            const grid = document.getElementById('products-grid');
            try {
                console.log("Attempting to fetch from:", `${ALB_BASE_URL}/api/products`);
                const response = await fetch(`${ALB_BASE_URL}/api/products`);
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error("Fetch Error:", error);
                grid.innerHTML = `
                    <div class="col-span-3 text-center p-8 glass-panel rounded-xl border-red-500/50 border">
                        <h2 class="text-red-400 text-xl font-bold mb-2">Connection Failed</h2>
                        <p class="text-slate-400 mb-4">${error.message}</p>
                        <div class="text-sm bg-black/30 p-4 rounded text-left font-mono text-orange-300">
                            Possible fixes:<br>
                            1. Open this site via <b>http://</b> (not https)<br>
                            2. Ensure the ALB Security Group allows Port 80 from 0.0.0.0/0<br>
                            3. Verify the ALB URL is correct.
                        </div>
                    </div>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            if (products.length === 0) {
                grid.innerHTML = '<p class="col-span-3 text-center text-slate-500">No products found in database.</p>';
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'glass-panel rounded-2xl p-6 transition-transform hover:-translate-y-2 hover:shadow-2xl hover:shadow-orange-500/20';
                card.innerHTML = `
                    <img src="${product.image_url}" class="w-full h-48 object-cover rounded-xl mb-4 opacity-90 shadow-inner bg-slate-800">
                    <h2 class="text-xl font-bold text-white mb-2">${product.name}</h2>
                    <p class="text-slate-400 text-sm mb-4 h-10">${product.description}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-2xl font-bold text-orange-400">$${product.price}</span>
                        <button onclick="addToCart(${product.id})" class="bg-gradient-to-r from-orange-500 to-red-500 text-white px-4 py-2 rounded-lg font-semibold hover:opacity-90 transition-opacity">
                            Add to Cart
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(productId) {
            cart.push({ productId, quantity: 1 });
            document.getElementById('cart-count').innerText = cart.length;
            // Cart sync with Redis would go here
        }

        fetchProducts();
    </script>
</body>
</html>
